# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: godlink
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn extractor:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
